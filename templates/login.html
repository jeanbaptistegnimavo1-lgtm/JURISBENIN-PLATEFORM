<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Administrateur - JurisBenin</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<nav>
    <h2>JurisBenin</h2>
    <div class="menu">
    <a href="/">Accueil</a>
    <a href="/lois">Lois</a>
    <a href="/decrets">Décrets</a>
    <a href="/recherche">Recherche</a>
</div>
</nav>

<section class="hero" style="max-width: 380px; margin: 80px auto;">

    <div class="ref-badge">Espace réservé</div>

    <h1 style="font-size: 28px;">Connexion administrateur</h1>

    {% if erreur %}
    <p style="color: #C8552B; font-size: 14px; margin-bottom: 16px;">{{ erreur }}</p>
    {% endif %}

    <form method="post" action="/login">
        <input
            type="text"
            name="username"
            placeholder="Nom d'utilisateur"
            required
        >
        <br><br>
        <input
            type="password"
            name="password"
            placeholder="Mot de passe"
            required
        >
        <br><br>
        <button type="submit">Se connecter</button>
    </form>

</section>
</body>
</html>
